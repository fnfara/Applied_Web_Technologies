<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Геометрический Калькулятор</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07112a;--bg2:#0c1e3d;--bg3:#102348;
  --accent:#3b82f6;--accent2:#60a5fa;--accent3:#93c5fd;
  --teal:#14b8a6;--teal2:#2dd4bf;
  --purple:#8b5cf6;--purple2:#a78bfa;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --border:rgba(59,130,246,0.25);--border2:rgba(59,130,246,0.4);
}
html,body{height:100%;overflow:hidden}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text)}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--border);background:rgba(7,17,42,0.85);backdrop-filter:blur(8px);flex-shrink:0}
.header-title{font-size:20px;font-weight:700;color:#fff;display:flex;align-items:center;gap:10px}
.header-title span{color:var(--accent2)}
.header-formula{font-family:monospace;font-size:13px;color:var(--accent3);background:rgba(59,130,246,0.1);border:1px solid var(--border2);border-radius:20px;padding:5px 14px}
.content{display:flex;flex:1;overflow:hidden}
.sidebar{width:200px;flex-shrink:0;background:rgba(12,30,61,0.75);backdrop-filter:blur(4px);border-right:1px solid var(--border);overflow-y:auto;padding:12px 0}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.grp-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);padding:12px 16px 6px}
.shape-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 16px;font-size:13px;color:var(--text2);background:none;border:none;border-left:3px solid transparent;cursor:pointer;text-align:left;transition:all .2s}
.shape-btn:hover{background:rgba(59,130,246,0.08);color:var(--text);border-left-color:var(--border2)}
.shape-btn.active{background:rgba(59,130,246,0.15);color:var(--accent2);border-left-color:var(--accent);font-weight:600}
.shape-btn .ico{width:20px;height:20px;flex-shrink:0}
.canvas-col{flex:1;display:flex;flex-direction:column;padding:16px;gap:10px;background:rgba(7,17,42,0.3)}
.canvas-wrap{flex:1;position:relative;background:rgba(12,30,61,0.5);border:1px solid var(--border);border-radius:12px;overflow:hidden;min-height:200px}
.canvas-wrap canvas{display:block;width:100%;height:100%}
.legend{display:flex;gap:16px;font-size:11.5px;color:var(--text3);flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:6px}
.leg-dot{width:8px;height:8px;border-radius:50%}
.fields-col{width:280px;flex-shrink:0;background:rgba(12,30,61,0.85);backdrop-filter:blur(8px);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-head{padding:14px 18px;border-bottom:1px solid var(--border);background:rgba(59,130,246,0.06);flex-shrink:0}
.panel-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:2px}
.panel-sub{font-size:11px;color:var(--text3);font-family:monospace}
.fields-scroll{flex:1;overflow-y:auto;padding:12px 18px}
.fields-scroll::-webkit-scrollbar{width:3px}
.fields-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.field-row{margin-bottom:10px}
.field-label{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.sym{font-family:monospace;font-size:14px;font-weight:700;color:var(--purple2);min-width:26px}
.fname{font-size:11.5px;color:var(--text3)}
.inp-wrap{display:flex;align-items:center;background:rgba(7,17,42,0.6);border:1px solid rgba(59,130,246,0.2);border-radius:8px;transition:all .2s}
.inp-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.15)}
.inp-wrap input{flex:1;padding:9px 12px;font-size:14px;font-family:monospace;background:transparent;border:none;outline:none;color:var(--text)}
.inp-wrap input::placeholder{color:var(--text3)}
.inp-wrap input.computed{color:var(--teal2)}
.inp-wrap input.user-set{color:#fff}
.panel-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;background:rgba(7,17,42,0.4);flex-shrink:0}
.btn-reset{flex:1;padding:9px;font-size:13px;border:1px solid var(--border2);border-radius:8px;background:transparent;color:var(--text2);cursor:pointer;transition:all .2s}
.btn-reset:hover{background:rgba(59,130,246,0.1);color:var(--text)}
.btn-row{display:flex;gap:8px}
.status{font-size:12px;min-height:16px;color:var(--teal2);text-align:center}
.status.err{color:#f87171}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--text3);font-size:14px;padding:20px}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="app">
  <div class="header">
    <div class="header-title"><span>∑</span> Геометрический Калькулятор</div>
    <div class="header-formula" id="hformula">Выберите фигуру</div>
  </div>
  <div class="content">
    <div class="sidebar" id="sidebar"></div>
    <div class="canvas-col">
      <div class="canvas-wrap"><canvas id="cv"></canvas></div>
      <div class="legend">
        <div class="leg"><div class="leg-dot" style="background:#2dd4bf"></div><span>фигура</span></div>
        <div class="leg"><div class="leg-dot" style="background:#a78bfa"></div><span>активный параметр</span></div>
        <div class="leg"><div class="leg-dot" style="background:rgba(59,130,246,0.6)"></div><span>площадь / объём</span></div>
      </div>
    </div>
    <div class="fields-col" id="fieldsCol">
      <div class="empty" id="emptyState">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="22" stroke="rgba(59,130,246,0.3)" stroke-width="1.5"/>
          <path d="M12 36 L24 12 L36 36 Z" stroke="rgba(59,130,246,0.3)" stroke-width="1.5" fill="none"/>
          <rect x="16" y="20" width="16" height="12" stroke="rgba(59,130,246,0.3)" stroke-width="1.5" fill="none"/>
        </svg>
        <span>Выберите фигуру слева</span>
      </div>
      <div id="fieldsBody" style="display:none;flex:1;flex-direction:column;overflow:hidden">
        <div class="panel-head">
          <div class="panel-title" id="pname"></div>
          <div class="panel-sub" id="pformula"></div>
        </div>
        <div class="fields-scroll" id="fieldsScroll"></div>
        <div class="panel-foot">
          <div class="btn-row"><button class="btn-reset" onclick="resetAll()">Сбросить</button></div>
          <div class="status" id="status"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const PI=Math.PI,sqrt=Math.sqrt,cbrt=Math.cbrt,sin=Math.sin,cos=Math.cos,
  tan=Math.tan,atan=Math.atan,atan2=Math.atan2,asin=Math.asin,acos=Math.acos,abs=Math.abs,R=PI/180;

function fmt(v){
  if(v==null||isNaN(v)||!isFinite(v))return'';
  const n=+v;
  if(abs(n)>=10000)return n.toFixed(1);
  if(abs(n)>=100)return n.toFixed(2);
  if(abs(n)>=1)return n.toFixed(4);
  return n.toFixed(5);
}

const SHAPES=[
  // ─── ТРЕУГОЛЬНИКИ ───────────────────────────────────────────────────────────
  {id:'right_tri',label:'Прямоугольный △',group:'Треугольники',
   formula:'a²+b²=c²',
   fields:[
     {k:'a',sym:'a',name:'катет a'},{k:'b',sym:'b',name:'катет b'},
     {k:'c',sym:'c',name:'гипотенуза c'},{k:'alpha',sym:'α',name:'угол α, °'},
     {k:'beta',sym:'β',name:'угол β, °'},{k:'S',sym:'S',name:'площадь'},
     {k:'P',sym:'P',name:'периметр'},{k:'h',sym:'h',name:'высота к c'},
   ],
   calc(v){
     let{a,b,c,alpha,beta,S,P,h}=v;
     const hv=k=>v[k]!=null&&!isNaN(v[k])&&+v[k]>0;
     // нормализуем углы к числам
     if(alpha!=null)alpha=+alpha;
     if(beta!=null)beta=+beta;
     // если задан только один угол — вычислить второй (оба должны быть <90)
     if(hv('alpha')&&!hv('beta')&&alpha>0&&alpha<90){beta=90-alpha;}
     else if(hv('beta')&&!hv('alpha')&&beta>0&&beta<90){alpha=90-beta;}

     // === ВСЕ ВОЗМОЖНЫЕ КОМБИНАЦИИ ИЗ 2 И 3 ПАРАМЕТРОВ ===
     // (исправлены ошибки в формулах: alpha теперь корректно считается как угол при вершине A)

     if(hv('a')&&hv('b')){                              // катет a + катет b
       c=Math.sqrt(a*a+b*b);
       alpha=Math.atan(b/a)/R; beta=90-alpha;
       S=a*b/2; P=a+b+c; h=a*b/c;
     }
     else if(hv('a')&&hv('c')&&c>a){                    // катет a + гипотенуза c
       b=Math.sqrt(c*c-a*a);
       alpha=Math.atan(b/a)/R; beta=90-alpha;
       S=a*b/2; P=a+b+c; h=a*b/c;
     }
     else if(hv('b')&&hv('c')&&c>b){                    // катет b + гипотенуза c
       a=Math.sqrt(c*c-b*b);
       alpha=Math.atan(b/a)/R; beta=90-alpha;
       S=a*b/2; P=a+b+c; h=a*b/c;
     }
     else if(hv('a')&&hv('alpha')&&alpha>0&&alpha<90){  // катет a + угол α
       beta=90-alpha;
       c=a/Math.cos(alpha*R);
       b=a*Math.tan(alpha*R);
       S=a*b/2; P=a+b+c; h=a*b/c;
     }
     else if(hv('a')&&hv('beta')&&beta>0&&beta<90){     // катет a + угол β
       alpha=90-beta;
       c=a/Math.sin(beta*R);   // a = c·sin β
       b=a*Math.tan(alpha*R);
       S=a*b/2; P=a+b+c; h=a*b/c;
     }
     else if(hv('b')&&hv('alpha')&&alpha>0&&alpha<90){  // катет b + угол α
       beta=90-alpha;
       c=b/Math.sin(alpha*R);  // b = c·sin α
       a=b/Math.tan(alpha*R);
       S=a*b/2; P=a+b+c; h=a*b/c;
     }
     else if(hv('b')&&hv('beta')&&beta>0&&beta<90){     // катет b + угол β
       alpha=90-beta;
       c=b/Math.cos(beta*R);
       a=b*Math.tan(beta*R);
       S=a*b/2; P=a+b+c; h=a*b/c;
     }
     else if(hv('c')&&hv('alpha')&&alpha>0&&alpha<90){  // гипотенуза c + угол α
       beta=90-alpha;
       a=c*Math.cos(alpha*R);
       b=c*Math.sin(alpha*R);
       S=a*b/2; P=a+b+c; h=a*b/c;
     }
     else if(hv('c')&&hv('beta')&&beta>0&&beta<90){     // гипотенуза c + угол β
       alpha=90-beta;
       a=c*Math.sin(beta*R);
       b=c*Math.cos(beta*R);
       S=a*b/2; P=a+b+c; h=a*b/c;
     }
     else if(hv('S')&&hv('a')){                         // площадь + катет a
       b=2*S/a;
       c=Math.sqrt(a*a+b*b);
       alpha=Math.atan(b/a)/R; beta=90-alpha;
       P=a+b+c; h=a*b/c;
     }
     else if(hv('S')&&hv('b')){                         // площадь + катет b
       a=2*S/b;
       c=Math.sqrt(a*a+b*b);
       alpha=Math.atan(b/a)/R; beta=90-alpha;
       P=a+b+c; h=a*b/c;
     }
     else if(hv('S')&&hv('c')){  
       h=2*S/c;  
                                                      // площадь + гипотенуза c
       const sum=Math.sqrt(c*c+4*S);
       const diff=Math.sqrt(c*c-4*S);
       if(c*c-4*S>=0){
         a=(sum+diff)/2; b=(sum-diff)/2;   // a — бо́льший катет (для стабильности)
         alpha=Math.atan(b/a)/R; beta=90-alpha;
         P=a+b+c; h=2*S/c;
       }
     }
     else if(hv('h')&&hv('c')){                         // высота h + гипотенуза c
       const hc=h*c; // = a·b
       const sum=Math.sqrt(c*c+2*hc);
       const disc=sum*sum-4*hc;
       if(disc>=0){
         a=(sum+Math.sqrt(disc))/2;
         b=(sum-Math.sqrt(disc))/2;
       }
       alpha=Math.atan(b/a)/R; beta=90-alpha;
       S=h*c/2; P=a+b+c;
     }
     else if(hv('h')&&hv('alpha')&&alpha>0&&alpha<90){  // высота h + угол α
       beta=90-alpha;
       a=h/Math.sin(alpha*R);
       b=a*Math.tan(alpha*R);
       c=a/Math.cos(alpha*R);
       S=h*c/2; P=a+b+c;
     }
     else if(hv('h')&&hv('beta')&&beta>0&&beta<90){     // высота h + угол β
       alpha=90-beta;
       b=h/Math.sin(beta*R);
       a=b*Math.tan(beta*R);
       c=b/Math.cos(beta*R);
       S=h*c/2; P=a+b+c;
     }
     else if(hv('h')&&hv('a')){                         // высота h + катет a
       if(a>h){
         const denom=Math.sqrt(a*a-h*h);
         c=a*a/denom;
         b=(h*c)/a;
         alpha=Math.atan(b/a)/R; beta=90-alpha;
         S=a*b/2; P=a+b+c;
       }
     }
     else if(hv('h')&&hv('b')){                         // высота h + катет b
       if(b>h){
         const denom=Math.sqrt(b*b-h*h);
         c=b*b/denom;
         a=(h*c)/b;
         alpha=Math.atan(b/a)/R; beta=90-alpha;
         S=a*b/2; P=a+b+c;
       }
     }
     else if(hv('S')&&hv('alpha')&&alpha>0&&alpha<90){  // площадь + угол α (3-параметр комбинация)
       beta=90-alpha;
       const sin2=Math.sin(2*alpha*R);
       c=Math.sqrt(4*S/sin2);
       a=c*Math.cos(alpha*R);
       b=c*Math.sin(alpha*R);
       P=a+b+c; h=2*S/c;
     }
     else if(hv('S')&&hv('beta')&&beta>0&&beta<90){     // площадь + угол β (3-параметр комбинация)
       alpha=90-beta;
       const sin2=Math.sin(2*beta*R);
       c=Math.sqrt(4*S/sin2);
       a=c*Math.sin(beta*R);
       b=c*Math.cos(beta*R);
       P=a+b+c; h=2*S/c;
     }

     // финальная нормализация (на случай, если пришли 3 параметра и один из них уже вычислил a+b)
     if(a&&b){
       c=c||Math.sqrt(a*a+b*b);
       S=S||0.5*a*b;
       P=P||a+b+c;
       h=h||a*b/c;
       if(!alpha)alpha=Math.atan(b/a)/R;
       if(!beta)beta=90-alpha;
     }

     return{a,b,c,alpha,beta,S,P,h};
   },
   draw(ctx,W,H,v,af){
     const a=v.a>0?v.a:1, b=v.b>0?v.b:1.5;
     const sc=Math.min((W-72)/b,(H-60)/a), ox=36, oy=H-28;
     const A=[ox,oy-a*sc], B=[ox+b*sc,oy], C=[ox,oy];

     // заливка треугольника
     fillPoly(ctx,[A,B,C],'rgba(59,130,246,0.08)');
     if(af==='S')fillPoly(ctx,[A,B,C],'rgba(59,130,246,0.22)');

     // контур треугольника
     if(af==='P')strokePoly(ctx,[A,B,C],'#a78bfa',2.5);
     else strokePoly(ctx,[A,B,C],'#2dd4bf',1.5);

     // выделение конкретной стороны (a, b, c)
     const segs={a:[A,C],b:[C,B],c:[A,B]};
     if(segs[af]){
       const[p1,p2]=segs[af];
       ctx.beginPath(); ctx.moveTo(...p1); ctx.lineTo(...p2);
       ctx.strokeStyle='#a78bfa'; ctx.lineWidth=3; ctx.stroke();
     }

     // === ВЫСОТА К ГИПОТЕНУЗЕ ===
     // вычисляем точку D — основание высоты из C на AB
     const vecAB=[B[0]-A[0],B[1]-A[1]];
     const vecAC=[C[0]-A[0],C[1]-A[1]];
     const lenAB2=vecAB[0]*vecAB[0]+vecAB[1]*vecAB[1];
     let t=(vecAC[0]*vecAB[0]+vecAC[1]*vecAB[1])/lenAB2;
     t=Math.max(0,Math.min(1,t));
     const D=[A[0]+t*vecAB[0], A[1]+t*vecAB[1]];

     // обычная пунктирная высота (всегда видна)
     ctx.save();
     ctx.setLineDash([4,3]);
     ctx.strokeStyle='#2dd4bf';
     ctx.lineWidth=1.5;
     ctx.beginPath();
     ctx.moveTo(C[0],C[1]);
     ctx.lineTo(D[0],D[1]);
     ctx.stroke();
     ctx.setLineDash([]);
     ctx.restore();

     // если выбрана высота — выделяем ярко (как стороны)
     if(af==='h'){
       ctx.beginPath();
       ctx.moveTo(C[0],C[1]);
       ctx.lineTo(D[0],D[1]);
       ctx.strokeStyle='#a78bfa';
       ctx.lineWidth=3;
       ctx.stroke();
     }

     drawRightAngle(ctx,C[0],C[1],12);

     // подписи сторон (как было)
     label(ctx,(A[0]+C[0])/2-14,(A[1]+C[1])/2,'a');
     label(ctx,(C[0]+B[0])/2,(C[1]+B[1])/2+16,'b');
     label(ctx,(A[0]+B[0])/2+10,(A[1]+B[1])/2-8,'c');

     // дуги углов
     drawAngleArc(ctx,C[0],C[1],[A[0]-C[0],A[1]-C[1]],[B[0]-C[0],B[1]-C[1]],20,'rgba(45,212,191,0.3)');
     if(af==='alpha')drawAngleArc(ctx,A[0],A[1],[C[0]-A[0],C[1]-A[1]],[B[0]-A[0],B[1]-A[1]],22,'#a78bfa');
     if(af==='beta')drawAngleArc(ctx,B[0],B[1],[A[0]-B[0],A[1]-B[1]],[C[0]-B[0],C[1]-B[1]],22,'#a78bfa');
   }
  },
  {id:'eq_tri',label:'Равносторонний △',group:'Треугольники',
   formula:'h = a√3/2',
   fields:[
     {k:'a',sym:'a',name:'сторона'},{k:'S',sym:'S',name:'площадь'},
     {k:'P',sym:'P',name:'периметр'},{k:'h',sym:'h',name:'высота'},
   ],
   calc(v){
     let{a,S,P,h}=v;
     const hv=k=>v[k]!=null&&+v[k]>0;
     if(!hv('a')){
       if(hv('S'))a=sqrt(4*S/sqrt(3));
       else if(hv('P'))a=P/3;
       else if(hv('h'))a=2*h/sqrt(3);
     }
     if(a){S=sqrt(3)/4*a*a;P=3*a;h=sqrt(3)/2*a;}
     return{a,S,P,h};
   },
   draw(ctx,W,H,v,af){
     const a=v.a>0?v.a:1,ht=sqrt(3)/2*a;
     const sc=Math.min((W-60)/a,(H-60)/ht),cx=W/2,by=H-24,ty=by-ht*sc;
     const A=[cx-a*sc/2,by],B=[cx+a*sc/2,by],C=[cx,ty];
     fillPoly(ctx,[A,B,C],'rgba(59,130,246,0.08)');
     if(af==='S')fillPoly(ctx,[A,B,C],'rgba(59,130,246,0.22)');
     if(af==='h')dashedLine(ctx,cx,ty,cx,by,'#a78bfa',2);
     if(af==='P')strokePoly(ctx,[A,B,C],'#a78bfa',2.5);else strokePoly(ctx,[A,B,C],'#2dd4bf',1.5);
     label(ctx,cx,(by+ty)/2+4,'a');
   }
  },
{
  id: 'scalene',
  label: 'Произвольный △',
  group: 'Треугольники',
  formula: 'S = √[s(s-a)(s-b)(s-c)]',
  fields: [
    { k: 'a', sym: 'a', name: 'сторона BC' },
    { k: 'b', sym: 'b', name: 'сторона AC' },
    { k: 'c', sym: 'c', name: 'сторона AB' },
    { k: 'alpha', sym: 'α', name: 'угол A, °' },
    { k: 'beta', sym: 'β', name: 'угол B, °' },
    { k: 'gamma', sym: 'γ', name: 'угол C, °' },
    { k: 'S', sym: 'S', name: 'площадь' },
    { k: 'P', sym: 'P', name: 'периметр' },
    { k: 'h', sym: 'h', name: 'высота к стороне c' },
  ],

  calc(v) {
    const R = Math.PI / 180;
    const EPS = 1e-9;
    const sq = x => Math.sqrt(Math.max(0, x));
    const clamp = (x, lo, hi) => Math.max(lo, Math.min(hi, x));
    const toNum = x => (x == null || x === '' || !isFinite(+x) ? null : +x);
    const pos = x => x != null && isFinite(x) && x > EPS;
    const ang = x => x != null && isFinite(x) && x > EPS && x < 180 - EPS;

    let a = toNum(v.a);
    let b = toNum(v.b);
    let c = toNum(v.c);
    let alpha = toNum(v.alpha);
    let beta = toNum(v.beta);
    let gamma = toNum(v.gamma);
    let S = toNum(v.S);
    let P = toNum(v.P);
    let h = toNum(v.h);

    const setIfEmpty = (key, value) => {
      if (value == null || !isFinite(value)) return false;
      if (typeof value === 'number' && value <= EPS) return false;
      switch (key) {
        case 'a': if (!pos(a)) { a = value; return true; } break;
        case 'b': if (!pos(b)) { b = value; return true; } break;
        case 'c': if (!pos(c)) { c = value; return true; return true; } break;
        case 'alpha': if (!ang(alpha)) { alpha = value; return true; } break;
        case 'beta': if (!ang(beta)) { beta = value; return true; } break;
        case 'gamma': if (!ang(gamma)) { gamma = value; return true; } break;
        case 'S': if (!pos(S)) { S = value; return true; } break;
        case 'P': if (!pos(P)) { P = value; return true; } break;
        case 'h': if (!pos(h)) { h = value; return true; } break;
      }
      return false;
    };

    const validTriangle = (aa, bb, cc) =>
      pos(aa) && pos(bb) && pos(cc) &&
      aa + bb > cc + EPS &&
      aa + cc > bb + EPS &&
      bb + cc > aa + EPS;

    const fillFromSides = () => {
      if (!validTriangle(a, b, c)) return false;

      const s = (a + b + c) / 2;
      const q = s * (s - a) * (s - b) * (s - c);
      if (q <= EPS) return false;

      S = Math.sqrt(q);
      P = a + b + c;
      h = 2 * S / c;

      alpha = Math.acos(clamp((b * b + c * c - a * a) / (2 * b * c), -1, 1)) / R;
      beta = Math.acos(clamp((a * a + c * c - b * b) / (2 * a * c), -1, 1)) / R;
      gamma = 180 - alpha - beta;

      return true;
    };

    const solveSSA = (knownSide, knownAngleDeg, otherSide) => {
      if (!pos(knownSide) || !ang(knownAngleDeg) || !pos(otherSide)) return null;
      const s = otherSide * Math.sin(knownAngleDeg * R) / knownSide;
      if (s < -1 || s > 1) return null;

      const p = Math.asin(clamp(s, -1, 1)) / R;
      const cands = [p, 180 - p].filter(x => x > EPS && x < 180 - EPS);

      for (const x of cands) {
        if (knownAngleDeg + x < 180 - EPS) return x;
      }
      return null;
    };

    for (let step = 0; step < 30; step++) {
      let changed = false;

      // Сумма углов
      if (ang(alpha) && ang(beta) && !ang(gamma)) changed = setIfEmpty('gamma', 180 - alpha - beta) || changed;
      if (ang(alpha) && ang(gamma) && !ang(beta)) changed = setIfEmpty('beta', 180 - alpha - gamma) || changed;
      if (ang(beta) && ang(gamma) && !ang(alpha)) changed = setIfEmpty('alpha', 180 - beta - gamma) || changed;

      // Периметр
      if (pos(a) && pos(b) && pos(c) && !pos(P)) changed = setIfEmpty('P', a + b + c) || changed;
      if (pos(P) && pos(a) && pos(b) && !pos(c)) changed = setIfEmpty('c', P - a - b) || changed;
      if (pos(P) && pos(a) && pos(c) && !pos(b)) changed = setIfEmpty('b', P - a - c) || changed;
      if (pos(P) && pos(b) && pos(c) && !pos(a)) changed = setIfEmpty('a', P - b - c) || changed;

      // Площадь и высота к стороне c
      if (pos(c) && pos(h) && !pos(S)) changed = setIfEmpty('S', c * h / 2) || changed;
      if (pos(S) && pos(c) && !pos(h)) changed = setIfEmpty('h', 2 * S / c) || changed;
      if (pos(S) && pos(h) && !pos(c)) changed = setIfEmpty('c', 2 * S / h) || changed;

      // Высота через сторону и угол
      if (pos(b) && ang(alpha) && !pos(h)) changed = setIfEmpty('h', b * Math.sin(alpha * R)) || changed;
      if (pos(a) && ang(beta) && !pos(h)) changed = setIfEmpty('h', a * Math.sin(beta * R)) || changed;
      if (pos(h) && ang(alpha) && !pos(b)) changed = setIfEmpty('b', h / Math.sin(alpha * R)) || changed;
      if (pos(h) && ang(beta) && !pos(a)) changed = setIfEmpty('a', h / Math.sin(beta * R)) || changed;
      if (pos(h) && pos(b) && !ang(alpha) && h <= b + EPS) changed = setIfEmpty('alpha', Math.asin(clamp(h / b, -1, 1)) / R) || changed;
      if (pos(h) && pos(a) && !ang(beta) && h <= a + EPS) changed = setIfEmpty('beta', Math.asin(clamp(h / a, -1, 1)) / R) || changed;

      // Закон косинусов: 2 стороны + включённый угол
      if (pos(b) && pos(c) && ang(alpha) && !pos(a)) changed = setIfEmpty('a', sq(b * b + c * c - 2 * b * c * Math.cos(alpha * R))) || changed;
      if (pos(a) && pos(c) && ang(beta) && !pos(b)) changed = setIfEmpty('b', sq(a * a + c * c - 2 * a * c * Math.cos(beta * R))) || changed;
      if (pos(a) && pos(b) && ang(gamma) && !pos(c)) changed = setIfEmpty('c', sq(a * a + b * b - 2 * a * b * Math.cos(gamma * R))) || changed;

      // Площадь по двум сторонам и включённому углу
      if (pos(b) && pos(c) && ang(alpha) && !pos(S)) changed = setIfEmpty('S', 0.5 * b * c * Math.sin(alpha * R)) || changed;
      if (pos(a) && pos(c) && ang(beta) && !pos(S)) changed = setIfEmpty('S', 0.5 * a * c * Math.sin(beta * R)) || changed;
      if (pos(a) && pos(b) && ang(gamma) && !pos(S)) changed = setIfEmpty('S', 0.5 * a * b * Math.sin(gamma * R)) || changed;

      // Площадь + сторона + включённый угол => вторая сторона
      if (pos(S) && pos(b) && ang(alpha) && !pos(c)) changed = setIfEmpty('c', 2 * S / (b * Math.sin(alpha * R))) || changed;
      if (pos(S) && pos(c) && ang(alpha) && !pos(b)) changed = setIfEmpty('b', 2 * S / (c * Math.sin(alpha * R))) || changed;

      if (pos(S) && pos(a) && ang(beta) && !pos(c)) changed = setIfEmpty('c', 2 * S / (a * Math.sin(beta * R))) || changed;
      if (pos(S) && pos(c) && ang(beta) && !pos(a)) changed = setIfEmpty('a', 2 * S / (c * Math.sin(beta * R))) || changed;

      if (pos(S) && pos(a) && ang(gamma) && !pos(b)) changed = setIfEmpty('b', 2 * S / (a * Math.sin(gamma * R))) || changed;
      if (pos(S) && pos(b) && ang(gamma) && !pos(a)) changed = setIfEmpty('a', 2 * S / (b * Math.sin(gamma * R))) || changed;

      // Сторона + 2 угла
      if (pos(a) && ang(alpha) && ang(beta) && !ang(gamma)) changed = setIfEmpty('gamma', 180 - alpha - beta) || changed;
      if (pos(a) && ang(alpha) && ang(gamma) && !ang(beta)) changed = setIfEmpty('beta', 180 - alpha - gamma) || changed;
      if (pos(b) && ang(alpha) && ang(beta) && !ang(gamma)) changed = setIfEmpty('gamma', 180 - alpha - beta) || changed;
      if (pos(b) && ang(beta) && ang(gamma) && !ang(alpha)) changed = setIfEmpty('alpha', 180 - beta - gamma) || changed;
      if (pos(c) && ang(alpha) && ang(gamma) && !ang(beta)) changed = setIfEmpty('beta', 180 - alpha - gamma) || changed;
      if (pos(c) && ang(beta) && ang(gamma) && !ang(alpha)) changed = setIfEmpty('alpha', 180 - beta - gamma) || changed;

      if (pos(a) && ang(alpha) && ang(beta) && ang(gamma)) {
        changed = setIfEmpty('b', a * Math.sin(beta * R) / Math.sin(alpha * R)) || changed;
        changed = setIfEmpty('c', a * Math.sin(gamma * R) / Math.sin(alpha * R)) || changed;
      }
      if (pos(b) && ang(alpha) && ang(beta) && ang(gamma)) {
        changed = setIfEmpty('a', b * Math.sin(alpha * R) / Math.sin(beta * R)) || changed;
        changed = setIfEmpty('c', b * Math.sin(gamma * R) / Math.sin(beta * R)) || changed;
      }
      if (pos(c) && ang(alpha) && ang(beta) && ang(gamma)) {
        changed = setIfEmpty('a', c * Math.sin(alpha * R) / Math.sin(gamma * R)) || changed;
        changed = setIfEmpty('b', c * Math.sin(beta * R) / Math.sin(gamma * R)) || changed;
      }

      // 2 стороны + противолежащий угол (SSA)
      if (pos(a) && pos(b) && ang(alpha) && !ang(beta)) changed = setIfEmpty('beta', solveSSA(a, alpha, b)) || changed;
      if (pos(a) && pos(c) && ang(alpha) && !ang(gamma)) changed = setIfEmpty('gamma', solveSSA(a, alpha, c)) || changed;
      if (pos(a) && pos(b) && ang(beta) && !ang(alpha)) changed = setIfEmpty('alpha', solveSSA(b, beta, a)) || changed;
      if (pos(b) && pos(c) && ang(beta) && !ang(gamma)) changed = setIfEmpty('gamma', solveSSA(b, beta, c)) || changed;
      if (pos(a) && pos(c) && ang(gamma) && !ang(alpha)) changed = setIfEmpty('alpha', solveSSA(c, gamma, a)) || changed;
      if (pos(b) && pos(c) && ang(gamma) && !ang(beta)) changed = setIfEmpty('beta', solveSSA(c, gamma, b)) || changed;

      // Высота + основание + угол
      if (pos(c) && pos(h) && ang(alpha) && !pos(b)) changed = setIfEmpty('b', h / Math.sin(alpha * R)) || changed;
      if (pos(c) && pos(h) && ang(beta) && !pos(a)) changed = setIfEmpty('a', h / Math.sin(beta * R)) || changed;

      if (pos(c) && pos(h) && pos(b) && !pos(a)) {
        const x = sq(b * b - h * h);
        const y = c - x;
        if (y > EPS) changed = setIfEmpty('a', Math.hypot(y, h)) || changed;
        if (y > EPS) changed = setIfEmpty('beta', Math.atan2(h, y) / R) || changed;
      }

      if (pos(c) && pos(h) && pos(a) && !pos(b)) {
        const y = sq(a * a - h * h);
        const x = c - y;
        if (x > EPS) changed = setIfEmpty('b', Math.hypot(x, h)) || changed;
        if (x > EPS) changed = setIfEmpty('alpha', Math.atan2(h, x) / R) || changed;
      }

      if (pos(c) && pos(h) && ang(alpha) && !pos(a)) {
        const x = h / Math.tan(alpha * R);
        const y = c - x;
        if (y > EPS) changed = setIfEmpty('a', Math.hypot(y, h)) || changed;
        if (y > EPS) changed = setIfEmpty('beta', Math.atan2(h, y) / R) || changed;
      }

      if (pos(c) && pos(h) && ang(beta) && !pos(b)) {
        const y = h / Math.tan(beta * R);
        const x = c - y;
        if (x > EPS) changed = setIfEmpty('b', Math.hypot(x, h)) || changed;
        if (x > EPS) changed = setIfEmpty('alpha', Math.atan2(h, x) / R) || changed;
      }

      // Высота + площадь + угол
      if (pos(S) && pos(h) && !pos(c)) changed = setIfEmpty('c', 2 * S / h) || changed;
      if (pos(S) && pos(h) && pos(c) && ang(alpha) && !pos(b)) changed = setIfEmpty('b', h / Math.sin(alpha * R)) || changed;
      if (pos(S) && pos(h) && pos(c) && ang(beta) && !pos(a)) changed = setIfEmpty('a', h / Math.sin(beta * R)) || changed;

      // Площадь + сторона + угол, где угол не включённый, но через высоту
      if (pos(S) && pos(a) && ang(beta) && !pos(h)) changed = setIfEmpty('h', a * Math.sin(beta * R)) || changed;
      if (pos(S) && pos(b) && ang(alpha) && !pos(h)) changed = setIfEmpty('h', b * Math.sin(alpha * R)) || changed;
      if (pos(S) && pos(a) && ang(beta) && !pos(c) && pos(h)) changed = setIfEmpty('c', 2 * S / h) || changed;
      if (pos(S) && pos(b) && ang(alpha) && !pos(c) && pos(h)) changed = setIfEmpty('c', 2 * S / h) || changed;

      // 3 стороны => всё остальное
      if (validTriangle(a, b, c)) {
        const before = [S, P, h, alpha, beta, gamma];
        fillFromSides();
        const after = [S, P, h, alpha, beta, gamma];
        if (String(before) !== String(after)) changed = true;
      }

      if (!changed) break;
    }

    // Финал
    if (validTriangle(a, b, c)) fillFromSides();

    return { a, b, c, alpha, beta, gamma, S, P, h };
  },

  draw(ctx, W, H, v, af) {
    const sq = x => Math.sqrt(Math.max(0, x));

    const a = v.a > 0 ? +v.a : 3;
    const b = v.b > 0 ? +v.b : 4;
    const c = v.c > 0 ? +v.c : 5;

    const cosA = Math.max(-1, Math.min(1, (b * b + c * c - a * a) / (2 * b * c)));
    const Ax = 0;
    const Bx = c;
    const Cx = b * cosA;
    const Cy = b * sq(1 - cosA * cosA);

    const xs = [0, Bx, Cx];
    const ys = [0, 0, Cy];
    const minX = Math.min(...xs);
    const maxX = Math.max(...xs);
    const minY = 0;
    const maxY = Math.max(...ys);

    const sc = Math.min((W - 70) / (maxX - minX || 1), (H - 60) / (maxY - minY || 1));
    const ox = 32 - minX * sc;
    const oy = H - 28;

    const A = [Ax * sc + ox, oy];
    const B = [Bx * sc + ox, oy];
    const C = [Cx * sc + ox, oy - Cy * sc];

    fillPoly(ctx, [A, B, C], af === 'S' ? 'rgba(59,130,246,0.22)' : 'rgba(59,130,246,0.08)');
    strokePoly(ctx, [A, B, C], af === 'P' ? '#a78bfa' : '#2dd4bf', af === 'P' ? 2.5 : 1.5);

    const segs = { a: [B, C], b: [A, C], c: [A, B] };
    if (segs[af]) {
      const [p1, p2] = segs[af];
      ctx.beginPath();
      ctx.moveTo(...p1);
      ctx.lineTo(...p2);
      ctx.strokeStyle = '#a78bfa';
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    if (af === 'alpha') drawAngleArc(ctx, A[0], A[1], [B[0] - A[0], B[1] - A[1]], [C[0] - A[0], C[1] - A[1]], 22, '#a78bfa');
    if (af === 'beta') drawAngleArc(ctx, B[0], B[1], [A[0] - B[0], A[1] - B[1]], [C[0] - B[0], C[1] - B[1]], 22, '#a78bfa');
    if (af === 'gamma') drawAngleArc(ctx, C[0], C[1], [A[0] - C[0], A[1] - C[1]], [B[0] - C[0], B[1] - C[1]], 22, '#a78bfa');

    if (af === 'h') {
      const footX = C[0];
      const footY = oy;
      dashedLine(ctx, C[0], C[1], footX, footY, '#a78bfa', 2);
    }

    ctx.font = 'bold 12px monospace';
    ctx.fillStyle = '#94a3b8';
    ctx.textAlign = 'center';
    ctx.fillText('A', A[0], A[1] + 16);
    ctx.fillText('B', B[0], B[1] + 16);
    ctx.fillText('C', C[0], C[1] - 8);
  }
}

   calc(v){
     let{a,b,alpha,beta,S,P,h}=v;
     const hv=k=>v[k]!=null&&+v[k]>0;

     if(hv('alpha')&&!hv('beta'))beta=180-2*+alpha;
     if(hv('beta')&&!hv('alpha'))alpha=(180-+beta)/2;
     if(hv('a')&&hv('b')&&b>a/2){h=sqrt(b*b-(a/2)*(a/2));alpha=acos(a/(2*b))/R;beta=180-2*alpha;}
     else if(hv('a')&&hv('alpha')&&alpha>0&&alpha<90){alpha=+alpha;beta=180-2*alpha;b=a/(2*Math.cos(alpha*R));h=b*Math.sin(alpha*R);}
     else if(hv('a')&&hv('h')){b=sqrt(h*h+(a/2)*(a/2));alpha=atan(h/(a/2))/R;beta=180-2*alpha;}
     else if(hv('b')&&hv('beta')&&beta>0&&beta<180){beta=+beta;alpha=(180-beta)/2;a=2*b*Math.cos(alpha*R);h=b*Math.sin(alpha*R);}
     else if(hv('S')&&hv('a')){h=2*S/a;b=sqrt(h*h+(a/2)*(a/2));alpha=atan(h/(a/2))/R;beta=180-2*alpha;}

  {
  id: 'parallelogram',
  label: 'Параллелограмм',
  group: 'Четырёхугольники',
  formula: 'S = a·b·sinα = a·h,  d₁²= a²+b²−2ab·cosα,  d₂²= a²+b²+2ab·cosα',
  fields: [
    { k:'a',   sym:'a',   name:'основание a' },
    { k:'b',   sym:'b',   name:'боковая сторона b' },
    { k:'alpha',sym:'α',  name:'острый угол α, °' },
    { k:'beta', sym:'β',  name:'тупой угол β, °' },
    { k:'h',   sym:'h',   name:'высота h' },
    { k:'S',   sym:'S',   name:'площадь S' },
    { k:'P',   sym:'P',   name:'периметр P' },
    { k:'d1',  sym:'d₁',  name:'диагональ d₁ (меньшая)' },

  calc(v) {
    const R = Math.PI / 180;
    let { a, b, alpha, beta, h, S, P, d1, d2 } = v;
    const hv = k => v[k] != null && +v[k] > 0;

    // ── helpers ──────────────────────────────────────────────────────────────
    // Recalculate everything once a, b, alpha (acute) are known
    const fin = () => {
      if (a == null || b == null || alpha == null) return;
      a = +a; b = +b; alpha = +alpha;
      if (alpha <= 0 || alpha >= 180 || a <= 0 || b <= 0) return;
      if (alpha > 90) alpha = 180 - alpha;   // keep acute
      beta = 180 - alpha;
      h  = b * Math.sin(alpha * R);
      S  = a * h;
      P  = 2 * (a + b);
      d1 = Math.sqrt(a*a + b*b - 2*a*b*Math.cos(alpha * R)); // shorter
      d2 = Math.sqrt(a*a + b*b + 2*a*b*Math.cos(alpha * R)); // longer
    };

    // cosα → α (always return acute angle 0..90)
    const acosAcute = c => {
      if (c < -1 || c > 1) return null;
      let ang = Math.acos(c) / R;
      return ang > 90 ? 180 - ang : ang;
    };

    // Quadratic: t² - p·t + q = 0  → larger root (= a, assuming a≥b)
    const quadLarge = (p, q) => {
      const d = p*p - 4*q;
      if (d < 0) return [null, null];
      return [(p + Math.sqrt(d)) / 2, (p - Math.sqrt(d)) / 2];
    };

    // ── normalise β → α ──────────────────────────────────────────────────────
    if (hv('beta') && !hv('alpha')) { alpha = 180 - +beta; v = {...v, alpha}; }

    // ── GROUP 1: both sides known ─────────────────────────────────────────────
    // a, b, α
    if (hv('a')&&hv('b')&&hv('alpha')) {
      a=+a; b=+b; alpha=+alpha; fin();
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }
    // a, b, h  →  α=asin(h/b)
    if (hv('a')&&hv('b')&&hv('h')) {
      a=+a; b=+b; h=+h;
      if (h <= b) { alpha = Math.asin(h/b)/R; fin(); }
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }
    // a, b, S  →  h=S/a, α=asin(h/b)
    if (hv('a')&&hv('b')&&hv('S')) {
      a=+a; b=+b; S=+S; h=S/a;
      if (h <= b) { alpha = Math.asin(h/b)/R; fin(); }
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }
    // a, b, d1  →  cosα=(a²+b²−d1²)/(2ab)
    if (hv('a')&&hv('b')&&hv('d1')) {
      a=+a; b=+b; d1=+d1;
      alpha = acosAcute((a*a+b*b-d1*d1)/(2*a*b));
      if (alpha) fin();
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }
    // a, b, d2  →  cosα=(d2²−a²−b²)/(2ab)
    if (hv('a')&&hv('b')&&hv('d2')) {
      a=+a; b=+b; d2=+d2;
      alpha = acosAcute((d2*d2-a*a-b*b)/(2*a*b));
      if (alpha) fin();
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }

    // ── GROUP 2: one side + P ─────────────────────────────────────────────────
    // a, P, α
    if (hv('a')&&hv('P')&&hv('alpha')) {
      a=+a; b=+P/2-a; alpha=+alpha;
      if (b>0) fin();
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }
    // a, P, h
    if (hv('a')&&hv('P')&&hv('h')) {
      a=+a; b=+P/2-a; h=+h;
      if (b>0&&h<=b) { alpha=Math.asin(h/b)/R; fin(); }
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }
    // a, P, S
    if (hv('a')&&hv('P')&&hv('S')) {
      a=+a; b=+P/2-a; S=+S; h=S/a;
      if (b>0&&h<=b) { alpha=Math.asin(h/b)/R; fin(); }
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }
    // a, P, d1
    if (hv('a')&&hv('P')&&hv('d1')) {
      a=+a; b=+P/2-a; d1=+d1;
      if (b>0) { alpha=acosAcute((a*a+b*b-d1*d1)/(2*a*b)); if(alpha)fin(); }
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }
    // a, P, d2
    if (hv('a')&&hv('P')&&hv('d2')) {
      a=+a; b=+P/2-a; d2=+d2;
      if (b>0) { alpha=acosAcute((d2*d2-a*a-b*b)/(2*a*b)); if(alpha)fin(); }
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }
    // b, P, α
    if (hv('b')&&hv('P')&&hv('alpha')) {
      b=+b; a=+P/2-b; alpha=+alpha;
      if (a>0) fin();
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }
    // b, P, h
    if (hv('b')&&hv('P')&&hv('h')) {
      b=+b; a=+P/2-b; h=+h;
      if (a>0&&h<=b) { alpha=Math.asin(h/b)/R; fin(); }
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }
    // b, P, S
    if (hv('b')&&hv('P')&&hv('S')) {
      b=+b; a=+P/2-b; S=+S; h=S/a;
      if (a>0&&h<=b) { alpha=Math.asin(h/b)/R; fin(); }
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }
    // b, P, d1
    if (hv('b')&&hv('P')&&hv('d1')) {
      b=+b; a=+P/2-b; d1=+d1;
      if (a>0) { alpha=acosAcute((a*a+b*b-d1*d1)/(2*a*b)); if(alpha)fin(); }
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }
    // b, P, d2
    if (hv('b')&&hv('P')&&hv('d2')) {
      b=+b; a=+P/2-b; d2=+d2;
      if (a>0) { alpha=acosAcute((d2*d2-a*a-b*b)/(2*a*b)); if(alpha)fin(); }
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }

    // ── GROUP 3: one side + α ─────────────────────────────────────────────────
    // a, α, h  →  b=h/sinα
    if (hv('a')&&hv('alpha')&&hv('h')) {
      a=+a; alpha=+alpha; h=+h;
      b = h/Math.sin(alpha*R);
      if (b>0) fin();
      return {a,b,alpha,beta,h,S,P,d1,d2};

    // a, α, S  →  h=S/a, b=h/sinα
    if (hv('a')&&hv('alpha')&&hv('S')) {
      a=+a; alpha=+alpha; S=+S; h=S/a;
      b = h/Math.sin(alpha*R);
      if (b>0) fin();
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }
    // a, α, d1  →  b²−2b·a·cosα+(a²−d1²)=0
    if (hv('a')&&hv('alpha')&&hv('d1')) {
      a=+a; alpha=+alpha; d1=+d1;
      const cosA=Math.cos(alpha*R), sinA=Math.sin(alpha*R);
      const D=d1*d1-a*a*sinA*sinA;
      if (D>=0) { b=a*cosA+Math.sqrt(D); if(b>0)fin(); }
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }
    // a, α, d2  →  b²+2b·a·cosα+(a²−d2²)=0
    if (hv('a')&&hv('alpha')&&hv('d2')) {
      a=+a; alpha=+alpha; d2=+d2;
      const cosA=Math.cos(alpha*R), sinA=Math.sin(alpha*R);
      const D=d2*d2-a*a*sinA*sinA;
      if (D>=0) { b=-a*cosA+Math.sqrt(D); if(b>0)fin(); }
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }
    // b, α, S  →  a=S/(b·sinα)
    if (hv('b')&&hv('alpha')&&hv('S')) {
      b=+b; alpha=+alpha; S=+S;
      a=S/(b*Math.sin(alpha*R));
      if (a>0) fin();
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }
    // b, α, d1  →  a²−2a·b·cosα+(b²−d1²)=0
    if (hv('b')&&hv('alpha')&&hv('d1')) {
      b=+b; alpha=+alpha; d1=+d1;
      const cosA=Math.cos(alpha*R), sinA=Math.sin(alpha*R);
      const D=d1*d1-b*b*sinA*sinA;
      if (D>=0) { a=b*cosA+Math.sqrt(D); if(a>0)fin(); }
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }
    // b, α, d2
    if (hv('b')&&hv('alpha')&&hv('d2')) {
      b=+b; alpha=+alpha; d2=+d2;
      const cosA=Math.cos(alpha*R), sinA=Math.sin(alpha*R);
      const D=d2*d2-b*b*sinA*sinA;
      if (D>=0) { a=-b*cosA+Math.sqrt(D); if(a>0)fin(); }
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }

    // ── GROUP 4: one side + h (no α) ─────────────────────────────────────────
    // b, h, S  →  a=S/h, α=asin(h/b)
    if (hv('b')&&hv('h')&&hv('S')) {
      b=+b; h=+h; S=+S; a=S/h;
      if (h<=b) { alpha=Math.asin(h/b)/R; fin(); }
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }
    // b, h, d1  →  α=asin(h/b), solve a from d1
    if (hv('b')&&hv('h')&&hv('d1')) {
      b=+b; h=+h; d1=+d1;
      if (h<=b) {
        alpha=Math.asin(h/b)/R;
        const cosA=Math.cos(alpha*R), sinA=h/b;
        const D=d1*d1-b*b*sinA*sinA;
        if (D>=0) { a=b*cosA+Math.sqrt(D); if(a>0)fin(); }
      }
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }
    // b, h, d2
    if (hv('b')&&hv('h')&&hv('d2')) {
      b=+b; h=+h; d2=+d2;
      if (h<=b) {
        alpha=Math.asin(h/b)/R;
        const cosA=Math.cos(alpha*R), sinA=h/b;
        const D=d2*d2-b*b*sinA*sinA;
        if (D>=0) { a=-b*cosA+Math.sqrt(D); if(a>0)fin(); }
      }
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }

    // ── GROUP 5: h + α (no sides directly) ───────────────────────────────────
    // h, α, S  →  b=h/sinα, a=S/h
    if (hv('h')&&hv('alpha')&&hv('S')) {
      h=+h; alpha=+alpha; S=+S;
      b=h/Math.sin(alpha*R); a=S/h;
      if (a>0&&b>0) fin();
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }
    // h, α, P  →  b=h/sinα, a=P/2−b
    if (hv('h')&&hv('alpha')&&hv('P')) {
      h=+h; alpha=+alpha;
      b=h/Math.sin(alpha*R); a=+P/2-b;
      if (a>0&&b>0) fin();
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }
    // h, α, d1  →  b=h/sinα, solve a from d1
    if (hv('h')&&hv('alpha')&&hv('d1')) {
      h=+h; alpha=+alpha; d1=+d1;
      b=h/Math.sin(alpha*R);
      const cosA=Math.cos(alpha*R), sinA=Math.sin(alpha*R);
      const D=d1*d1-b*b*sinA*sinA;
      if (D>=0) { a=b*cosA+Math.sqrt(D); if(a>0)fin(); }
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }
    // h, α, d2
    if (hv('h')&&hv('alpha')&&hv('d2')) {
      h=+h; alpha=+alpha; d2=+d2;
      b=h/Math.sin(alpha*R);
      const cosA=Math.cos(alpha*R), sinA=Math.sin(alpha*R);
      const D=d2*d2-b*b*sinA*sinA;
      if (D>=0) { a=-b*cosA+Math.sqrt(D); if(a>0)fin(); }
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }

    // ── GROUP 6: S + α + P ───────────────────────────────────────────────────
    // S, α, P  →  a+b=P/2, ab=S/sinα  →  квадратное уравнение
    if (hv('S')&&hv('alpha')&&hv('P')) {
      S=+S; alpha=+alpha;
      const sumAB=+P/2, prodAB=S/Math.sin(alpha*R);
      [a,b]=quadLarge(sumAB,prodAB);
      if (a&&b&&a>0&&b>0) fin();
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }

    // ── GROUP 7: two diagonals known ─────────────────────────────────────────
    // d1²+d2²=2(a²+b²),  d2²−d1²=4ab·cosα

    // d1, d2, a  →  b²=(d1²+d2²)/2−a²
    if (hv('d1')&&hv('d2')&&hv('a')) {
      d1=+d1; d2=+d2; a=+a;
      const b2=(d1*d1+d2*d2)/2-a*a;
      if (b2>0) {
        b=Math.sqrt(b2);
        alpha=acosAcute((a*a+b*b-d1*d1)/(2*a*b));
        if (alpha) fin();
      }
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }
    // d1, d2, b
    if (hv('d1')&&hv('d2')&&hv('b')) {
      d1=+d1; d2=+d2; b=+b;
      const a2=(d1*d1+d2*d2)/2-b*b;
      if (a2>0) {
        a=Math.sqrt(a2);
        alpha=acosAcute((a*a+b*b-d1*d1)/(2*a*b));
        if (alpha) fin();
      }
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }
    // d1, d2, α  →  ab·cosα=(d2²−d1²)/4, a²+b²=(d1²+d2²)/2  →  решаем систему
    if (hv('d1')&&hv('d2')&&hv('alpha')) {
      d1=+d1; d2=+d2; alpha=+alpha;
      const cosA=Math.cos(alpha*R);
      if (Math.abs(cosA)>1e-10) {
        const prodAB=(d2*d2-d1*d1)/(4*cosA);
        const s2=(d1*d1+d2*d2)/2;
        const sumAB=Math.sqrt(Math.max(0,s2+2*prodAB));
        [a,b]=quadLarge(sumAB,prodAB);
        if (a&&b&&a>0&&b>0) fin();
      }
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }
    // d1, d2, h  →  numeric: h=b·sinα, d1²=a²+b²−2ab·cosα, d2²=a²+b²+2ab·cosα
    //   b²sin²α+(ab−b·h_via_b)... use d1,d2,S approach after deriving from h
    //   Alternative: d1²+d2²=2(a²+b²), so a²+b² known; but still 3 unknowns (a,b,α).
    //   Requires one more constraint → underdetermined. Skip.

    // d1, d2, S  →  ab=√(S²+((d2²−d1²)/4)²), a²+b²=(d1²+d2²)/2
    if (hv('d1')&&hv('d2')&&hv('S')) {
      d1=+d1; d2=+d2; S=+S;
      const prodAB=Math.sqrt(S*S+((d2*d2-d1*d1)/4)**2);
      const s2=(d1*d1+d2*d2)/2;
      const sumAB=Math.sqrt(Math.max(0,s2+2*prodAB));
      [a,b]=quadLarge(sumAB,prodAB);
      if (a&&b&&a>0&&b>0) {
        alpha=acosAcute((a*a+b*b-d1*d1)/(2*a*b));
        if (alpha) fin();
      }
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }
    // d1, d2, P  →  a+b=P/2, a²+b²=(d1²+d2²)/2  →  ab=((P/2)²−(d1²+d2²)/2)/2
    if (hv('d1')&&hv('d2')&&hv('P')) {
      d1=+d1; d2=+d2;
      const sumAB=+P/2, s2=(d1*d1+d2*d2)/2;
      const prodAB=(sumAB*sumAB-s2)/2;
      [a,b]=quadLarge(sumAB,prodAB);
      if (a&&b&&a>0&&b>0) {
        alpha=acosAcute((a*a+b*b-d1*d1)/(2*a*b));
        if (alpha) fin();
      }
      return {a,b,alpha,beta,h,S,P,d1,d2};
    }

    return {a,b,alpha,beta,h,S,P,d1,d2};
  },

  draw(ctx, W, H, v, af) {
    const R = Math.PI / 180;
    const abs = Math.abs;
    const a  = v.a > 0 ? +v.a : 3;
    const bv = v.b > 0 ? +v.b : 2;
    const al = (v.alpha > 0 ? +v.alpha : 60) * R;
    const hh = bv * Math.sin(al);
    const dx = bv * Math.cos(al);
    const sc = Math.min((W - 80) / (a + abs(dx)), (H - 60) / hh);
    const pad = 30;
    const ox  = pad + (dx < 0 ? abs(dx) * sc : 0);
    const oy  = H - pad;

    // Vertices: P1=bottom-left, Q=bottom-right, Rp=top-right, Sp=top-left
    const P1 = [ox,                   oy];
    const Q  = [ox + a * sc,          oy];
    const Rp = [ox + a*sc + dx*sc,    oy - hh*sc];
    const Sp = [ox + dx*sc,           oy - hh*sc];

    // Note: diagonal P1-Rp = d2 (longer), Q-Sp = d1 (shorter)

    // Fill
    fillPoly(ctx, [P1,Q,Rp,Sp], 'rgba(59,130,246,0.08)');
    if (af === 'S') fillPoly(ctx, [P1,Q,Rp,Sp], 'rgba(59,130,246,0.22)');

    // Always draw diagonals as faint dashed lines
    dashedLine(ctx, P1[0],P1[1], Rp[0],Rp[1], 'rgba(59,130,246,0.18)', 1);
    dashedLine(ctx, Q[0], Q[1],  Sp[0],Sp[1],  'rgba(59,130,246,0.18)', 1);

    // Highlight specific elements
    if (af === 'h') {
      dashedLine(ctx, Sp[0], Sp[1], Sp[0], P1[1], '#a78bfa', 2);
    }
    if (af === 'a') {
      ctx.beginPath(); ctx.moveTo(P1[0], oy+12); ctx.lineTo(Q[0], oy+12);
      ctx.strokeStyle = '#a78bfa'; ctx.lineWidth = 2; ctx.stroke();
    }
    if (af === 'b') {
      ctx.beginPath(); ctx.moveTo(P1[0], P1[1]); ctx.lineTo(Sp[0], Sp[1]);
      ctx.strokeStyle = '#a78bfa'; ctx.lineWidth = 3; ctx.stroke();
    }
    if (af === 'alpha') {
      drawAngleArc(ctx, P1[0],P1[1],
        [Q[0]-P1[0], Q[1]-P1[1]], [Sp[0]-P1[0], Sp[1]-P1[1]], 24, '#a78bfa');
    }

// ═══════════════════════════════════════════════════════════════

{
  
  id: 'trapezoid',
  label: 'Трапеция',
  group: 'Четырёхугольники',
  formula: 'S = (a+b)/2 · h = m·h',
  fields: [
    { k: 'a', sym: 'a', name: 'основание a (большее)' },
    { k: 'b', sym: 'b', name: 'основание b (меньшее)' },
    { k: 'c', sym: 'c', name: 'боковая c (левая)' },
    { k: 'd', sym: 'd', name: 'боковая d (правая)' },
    { k: 'h', sym: 'h', name: 'высота h' },
    { k: 'S', sym: 'S', name: 'площадь S' },
    { k: 'P', sym: 'P', name: 'периметр P' },
    { k: 'm', sym: 'm', name: 'средняя линия m' },
    { k: 'alpha', sym: 'α', name: 'угол при a у c, °' },
    { k: 'beta', sym: 'β', name: 'угол при a у d, °' },
  ],

  calc(v) {
    const R = Math.PI / 180;
    const EPS = 1e-9;
    const sq = x => Math.sqrt(Math.max(0, x));
    const toNum = x => (x == null || x === '' || !isFinite(+x) ? null : +x);
    const pos = x => x != null && isFinite(x) && x > EPS;
    const eq = (x, y, eps = 1e-7) => pos(x) && pos(y) && Math.abs(x - y) <= eps;

    let a = toNum(v.a);
    let b = toNum(v.b);
    let c = toNum(v.c);
    let d = toNum(v.d);
    let h = toNum(v.h);
    let S = toNum(v.S);
    let P = toNum(v.P);
    let m = toNum(v.m);
    let alpha = toNum(v.alpha);
    let beta = toNum(v.beta);

    if (pos(a) && pos(b) && b > a) [a, b] = [b, a];

    let x = null; // горизонтальная проекция слева
    let y = null; // горизонтальная проекция справа
    let isoForced = false;

    const setIfEmpty = (name, value) => {
      if (!pos(value)) return false;
      switch (name) {
        case 'a': if (!pos(a)) { a = value; return true; } break;
        case 'b': if (!pos(b)) { b = value; return true; } break;
        case 'c': if (!pos(c)) { c = value; return true; } break;
        case 'd': if (!pos(d)) { d = value; return true; } break;
        case 'h': if (!pos(h)) { h = value; return true; } break;
        case 'S': if (!pos(S)) { S = value; return true; } break;
        case 'P': if (!pos(P)) { P = value; return true; } break;
        case 'm': if (!pos(m)) { m = value; return true; } break;
        case 'alpha': if (!pos(alpha)) { alpha = value; return true; } break;
        case 'beta': if (!pos(beta)) { beta = value; return true; } break;
        case 'x': if (!pos(x)) { x = value; return true; } break;
        case 'y': if (!pos(y)) { y = value; return true; } break;
      }
      return false;
    };

    const finalize = () => {
      if (pos(a) && pos(b) && b > a) [a, b] = [b, a];

      if (pos(a) && pos(b)) m = (a + b) / 2;
      if (pos(m) && pos(h)) S = m * h;
      if (pos(a) && pos(b) && pos(h)) S = (a + b) * h / 2;
      if (pos(a) && pos(b) && pos(c) && pos(d)) P = a + b + c + d;

      if (pos(h) && pos(c) && h <= c + EPS) {
        x = sq(c * c - h * h);
        alpha = Math.atan2(h, x) / R;
      }
      if (pos(h) && pos(d) && h <= d + EPS) {
        y = sq(d * d - h * h);
        beta = Math.atan2(h, y) / R;
      }

      if (pos(a) && pos(b) && pos(x) && pos(y)) {
        const delta = a - b;
        if (Math.abs((x + y) - delta) > 1e-5) {
          const k = delta / Math.max(EPS, x + y);
          x *= k;
          y *= k;
          if (pos(h)) {
            c = Math.hypot(x, h);
            d = Math.hypot(y, h);
            alpha = Math.atan2(h, x) / R;
            beta = Math.atan2(h, y) / R;
          }
        }
      }

      return { a, b, c, d, h, S, P, m, alpha, beta };
    };

    const delta = () => (pos(a) && pos(b) ? a - b : null);
    const sumBases = () => (pos(a) && pos(b) ? a + b : null);

    // Предзаполнение из базовых формул
    if (pos(m) && pos(a) && !pos(b)) b = 2 * m - a;
    if (pos(m) && pos(b) && !pos(a)) a = 2 * m - b;
    if (pos(S) && pos(h) && !pos(m)) m = S / h;
    if (pos(S) && pos(h) && pos(a) && !pos(b)) b = 2 * S / h - a;
    if (pos(S) && pos(h) && pos(b) && !pos(a)) a = 2 * S / h - b;
    if (pos(P) && pos(c) && pos(d) && pos(a) && !pos(b)) b = P - a - c - d;
    if (pos(P) && pos(c) && pos(d) && pos(b) && !pos(a)) a = P - b - c - d;

    // Шаг 1. Высота из частых комбинаций
    if (!pos(h)) {
      if (pos(S) && pos(m)) h = S / m;
      else if (pos(S) && pos(a) && pos(b)) h = 2 * S / (a + b);
      else if (pos(c) && pos(alpha)) h = c * Math.sin(alpha * R);
      else if (pos(d) && pos(beta)) h = d * Math.sin(beta * R);
      else if (pos(a) && pos(b) && pos(alpha) && pos(beta)) {
        const sa = Math.sin(alpha * R), ca = Math.cos(alpha * R);
        const sb = Math.sin(beta * R), cb = Math.cos(beta * R);
        const den = ca / Math.max(EPS, sa) + cb / Math.max(EPS, sb);
        if (den > EPS) h = (a - b) / den;
      } else if (pos(a) && pos(b) && pos(c) && pos(d) && a > b) {
        const D = a - b;
        const xx = (c * c - d * d + D * D) / (2 * D);
        const h2 = c * c - xx * xx;
        if (h2 > EPS) h = Math.sqrt(h2);
      }
    }

    // Шаг 2. Проекции x/y
    if (!pos(x)) {
      if (pos(h) && pos(c) && c + EPS >= h) x = sq(c * c - h * h);
      else if (pos(h) && pos(alpha)) x = h / Math.tan(alpha * R);
    }
    if (!pos(y)) {
      if (pos(h) && pos(d) && d + EPS >= h) y = sq(d * d - h * h);
      else if (pos(h) && pos(beta)) y = h / Math.tan(beta * R);
    }

    // Шаг 3. Разница оснований
    let D = delta();
    if (!pos(D)) {
      if (pos(x) && pos(y)) D = x + y;
      else if (pos(h) && pos(alpha) && pos(beta)) {
        D = h / Math.tan(alpha * R) + h / Math.tan(beta * R);
      }
    }

    // Шаг 4. Средняя линия / сумма оснований
    let SUM = sumBases();
    if (!pos(SUM)) {
      if (pos(m)) SUM = 2 * m;
      else if (pos(S) && pos(h)) SUM = 2 * S / h;
      else if (pos(P) && pos(c) && pos(d)) SUM = P - c - d;
    }
    if (!pos(m) && pos(SUM)) m = SUM / 2;

    // Шаг 5. Восстановить основания
    if (pos(SUM) && pos(D)) {
      if (!pos(a)) a = (SUM + D) / 2;
      if (!pos(b)) b = (SUM - D) / 2;
    }
    if (pos(a) && pos(D) && !pos(b)) b = a - D;
    if (pos(b) && pos(D) && !pos(a)) a = b + D;

    // Шаг 6. Если известны основания и одна проекция, добрать вторую
    D = delta();
    if (pos(D)) {
      if (pos(x) && !pos(y)) y = D - x;
      if (pos(y) && !pos(x)) x = D - y;
    }

    // если асимметрии нет, но есть одна боковая/один угол/одна проекция
    const canAssumeIso =
      pos(D) &&
      !pos(x) &&
      !pos(y) &&
      (
        (pos(c) && !pos(d)) ||
        (pos(d) && !pos(c)) ||
        (pos(alpha) && !pos(beta)) ||
        (pos(beta) && !pos(alpha))
      );

    if (canAssumeIso) {
      x = y = D / 2;
      isoForced = true;
      if (pos(h) && pos(x)) {
        if (pos(c) && !pos(d)) d = Math.hypot(x, h);
        if (pos(d) && !pos(c)) c = Math.hypot(y, h);
        if (pos(alpha) && !pos(beta)) beta = alpha;
        if (pos(beta) && !pos(alpha)) alpha = beta;
      }
    }

    // Шаг 8. Достроить боковые стороны и углы
    if (pos(h) && pos(x)) {
      if (!pos(c)) c = Math.hypot(x, h);
      if (!pos(alpha)) alpha = Math.atan2(h, x) / R;
    }
    if (pos(h) && pos(y)) {
      if (!pos(d)) d = Math.hypot(y, h);
      if (!pos(beta)) beta = Math.atan2(h, y) / R;
    }

    // Шаг 9. Из периметра
    if (pos(P)) {
      if (pos(a) && pos(b) && pos(c) && !pos(d)) d = P - a - b - c;
      if (pos(a) && pos(b) && pos(d) && !pos(c)) c = P - a - b - d;
      if (pos(c) && pos(d) && pos(a) && !pos(b)) b = P - a - c - d;
      if (pos(c) && pos(d) && pos(b) && !pos(a)) a = P - b - c - d;
      if (pos(m) && pos(c) && pos(d) && !pos(a) && !pos(b)) {
        SUM = P - c - d;
        a = m + (SUM - 2 * m + (x || 0) + (y || 0)) / 2;
        b = SUM - a;
      }
    }

    // Шаг 10. Полезные частые комбинации с площадью
    if (pos(S) && pos(h) && !pos(m)) m = S / h;
    if (pos(S) && pos(c) && pos(alpha) && !pos(h)) h = c * Math.sin(alpha * R);
    if (pos(S) && pos(d) && pos(beta) && !pos(h)) h = d * Math.sin(beta * R);

    // Шаг 11. Если есть h + боковая, но нет оснований/площади:
    // для равнобедренной трапеции можно найти только вторую боковую/угол, а не основания.
    if (isoForced && pos(h) && pos(c) && !pos(d)) d = c;
    if (isoForced && pos(h) && pos(d) && !pos(c)) c = d;
    if (isoForced && pos(alpha) && !pos(beta)) beta = alpha;
    if (isoForced && pos(beta) && !pos(alpha)) alpha = beta;

    // Шаг 12. Симметрия, если явно равнобедренная по двум боковым/двум углам
    if (pos(c) && pos(d) && eq(c, d) && pos(h) && !pos(x) && pos(D)) {
      x = y = D / 2;
    }
    if (pos(alpha) && pos(beta) && eq(alpha, beta) && pos(h) && !pos(x) && pos(D)) {
      x = y = D / 2;
      c = Math.hypot(x, h);
      d = Math.hypot(y, h);
    }

    return finalize();
  },

  draw(ctx, W, H, v, af) {

    const sq = x => Math.sqrt(Math.max(0, x));
    const pos = x => x != null && +x > 0;

    let b = pos(v.b) ? +v.b : 3.5;

    if (pos(v.h) && pos(v.c) && +v.c >= +v.h) x = sq(v.c * v.c - v.h * v.h);
    else if (pos(v.h) && pos(v.alpha)) x = +v.h / Math.tan(+v.alpha * R);

    if (pos(v.h) && pos(v.d) && +v.d >= +v.h) y = sq(v.d * v.d - v.h * v.h);
    else if (pos(v.h) && pos(v.beta)) y = +v.h / Math.tan(+v.beta * R);

    if (x == null && y == null) {
      x = D / 2;
      y = D / 2;
    } else if (x == null) {
      y = Math.max(0, Math.min(D, y));
      x = D - y;
    } else if (y == null) {
      x = Math.max(0, Math.min(D, x));
      y = D - x;
    }

    const sum = Math.max(1e-6, x + y);
    if (Math.abs(sum - D) > 1e-6) {
      x *= D / sum;
      y *= D / sum;
    }

    const sc = Math.min((W - 80) / a, (H - 80) / h);
    const ox = (W - a * sc) / 2;
    const oy = H - 30;

    const A = [ox, oy];
    const B = [ox + a * sc, oy];
    const Dp = [ox + x * sc, oy - h * sc];
    const Cp = [ox + (a - y) * sc, oy - h * sc];

    fillPoly(ctx, [A, B, Cp, Dp], af === 'S' ? 'rgba(59,130,246,0.22)' : 'rgba(59,130,246,0.08)');

    if (af === 'h') dashedLine(ctx, Dp[0], Dp[1], Dp[0], A[1], '#a78bfa', 2);

    if (af === 'm') {
      const M1 = [(A[0] + Dp[0]) / 2, (A[1] + Dp[1]) / 2];
      const M2 = [(B[0] + Cp[0]) / 2, (B[1] + Cp[1]) / 2];
      dashedLine(ctx, M1[0], M1[1], M2[0], M2[1], '#a78bfa', 2);
    }

    const strokeColor = af === 'P' ? '#a78bfa' : '#2dd4bf';
    const strokeWidth = af === 'P' ? 2.5 : 1.5;
    strokePoly(ctx, [A, B, Cp, Dp], strokeColor, strokeWidth);

    if (af === 'a') { ctx.lineWidth = 3; ctx.strokeStyle = '#a78bfa'; ctx.beginPath(); ctx.moveTo(...A); ctx.lineTo(...B); ctx.stroke(); }
    if (af === 'b') { ctx.lineWidth = 3; ctx.strokeStyle = '#a78bfa'; ctx.beginPath(); ctx.moveTo(...Dp); ctx.lineTo(...Cp); ctx.stroke(); }
    if (af === 'c') { ctx.lineWidth = 3; ctx.strokeStyle = '#a78bfa'; ctx.beginPath(); ctx.moveTo(...A); ctx.lineTo(...Dp); ctx.stroke(); }
    if (af === 'd') { ctx.lineWidth = 3; ctx.strokeStyle = '#a78bfa'; ctx.beginPath(); ctx.moveTo(...B); ctx.lineTo(...Cp); ctx.stroke(); }

    if (af === 'alpha') drawAngleArc(ctx, A[0], A[1], [B[0] - A[0], B[1] - A[1]], [Dp[0] - A[0], Dp[1] - A[1]], 25, '#a78bfa');
    if (af === 'beta') drawAngleArc(ctx, B[0], B[1], [A[0] - B[0], A[1] - B[1]], [Cp[0] - B[0], Cp[1] - B[1]], 25, '#a78bfa');

    ctx.fillStyle = '#94a3b8';
    ctx.font = '12px monospace';
    label(ctx, (A[0] + B[0]) / 2, A[1] + 20, 'a');
    label(ctx, (Dp[0] + Cp[0]) / 2, Dp[1] - 15, 'b');
  }
}

// ─── DRAWING HELPERS ──────────────────────────────────────────────────────────
function fillPoly(ctx,pts,fill){ctx.beginPath();pts.forEach((p,i)=>i?ctx.lineTo(...p):ctx.moveTo(...p));ctx.closePath();ctx.fillStyle=fill;ctx.fill();}
function strokePoly(ctx,pts,col,lw){ctx.beginPath();pts.forEach((p,i)=>i?ctx.lineTo(...p):ctx.moveTo(...p));ctx.closePath();ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.stroke();}
function dashedLine(ctx,x1,y1,x2,y2,col,lw){ctx.save();ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.setLineDash([5,4]);ctx.stroke();ctx.restore();}
function dashedArc(ctx,cx,cy,r,col){ctx.save();ctx.beginPath();ctx.arc(cx,cy,r,0,PI*2);ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.setLineDash([5,4]);ctx.stroke();ctx.restore();}
function dot(ctx,x,y){ctx.beginPath();ctx.arc(x,y,3,0,PI*2);ctx.fillStyle='#a78bfa';ctx.fill();}
function arrowLine(ctx,x1,y1,x2,y2,col){
  ctx.save();ctx.strokeStyle=col;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  const ang=atan2(y2-y1,x2-x1),as=7;
  ctx.beginPath();ctx.moveTo(x2-as*Math.cos(ang-.4),y2-as*Math.sin(ang-.4));ctx.lineTo(x2,y2);ctx.lineTo(x2-as*Math.cos(ang+.4),y2-as*Math.sin(ang+.4));ctx.stroke();
  ctx.beginPath();ctx.moveTo(x1+as*Math.cos(ang-.4+PI),y1+as*Math.sin(ang-.4+PI));ctx.lineTo(x1,y1);ctx.lineTo(x1+as*Math.cos(ang+.4+PI),y1+as*Math.sin(ang+.4+PI));ctx.stroke();
  ctx.restore();
}
function label(ctx,x,y,text){ctx.font='bold 12px monospace';ctx.fillStyle='#60a5fa';ctx.textAlign='center';ctx.fillText(text,x,y);}
function drawRightAngle(ctx,x,y,s){ctx.strokeStyle='rgba(45,212,191,0.5)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x+s,y);ctx.lineTo(x+s,y-s);ctx.lineTo(x,y-s);ctx.stroke();}

function drawAngleArc(ctx,vx,vy,dir1,dir2,radius,col){
  ctx.save();
  let ang1=atan2(dir1[1],dir1[0]);
  let ang2=atan2(dir2[1],dir2[0]);
  if(ang1<0)ang1+=2*PI;
  if(ang2<0)ang2+=2*PI;
  let diff=ang2-ang1;
  if(diff<0)diff+=2*PI;
  // pick the shorter arc (interior angle)
  let startA,endA,ccw;
  if(diff<=PI){startA=ang1;endA=ang2;ccw=false;}
  else{startA=ang2;endA=ang1;ccw=false;}
  ctx.beginPath();
  ctx.moveTo(vx,vy);
  ctx.arc(vx,vy,radius,startA,endA,ccw);
  ctx.closePath();
  ctx.fillStyle=col==='#a78bfa'?'rgba(167,139,250,0.25)':'rgba(45,212,191,0.15)';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(vx,vy,radius,startA,endA,ccw);
  ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.stroke();
  ctx.restore();
}

  for(let i=0;i<80;i++){
    bgItems.push({
      x:Math.random()*bgCanvas.width,y:Math.random()*bgCanvas.height,
      sym:mathSymbols[Math.floor(Math.random()*mathSymbols.length)],
      size:10+Math.random()*22,alpha:0.04+Math.random()*0.12,
      speed:0.2+Math.random()*0.5,drift:(Math.random()-0.5)*0.3,
      color:Math.random()<0.5?'59,130,246':'139,92,246'
    });
  }
}

function drawBg(){
  bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
  bgCtx.strokeStyle='rgba(59,130,246,0.06)';bgCtx.lineWidth=1;
  for(let x=0;x<bgCanvas.width;x+=50){bgCtx.beginPath();bgCtx.moveTo(x,0);bgCtx.lineTo(x,bgCanvas.height);bgCtx.stroke();}
  for(let y=0;y<bgCanvas.height;y+=50){bgCtx.beginPath();bgCtx.moveTo(0,y);bgCtx.lineTo(bgCanvas.width,y);bgCtx.stroke();}
  bgItems.forEach(item=>{
    bgCtx.save();bgCtx.globalAlpha=item.alpha;bgCtx.font=`${item.size}px monospace`;
    bgCtx.fillStyle=`rgb(${item.color})`;bgCtx.fillText(item.sym,item.x,item.y);bgCtx.restore();
    item.y-=item.speed;item.x+=item.drift;
    if(item.y<-30)item.y=bgCanvas.height+10;
    if(item.x<-30)item.x=bgCanvas.width+10;
    if(item.x>bgCanvas.width+30)item.x=-10;
  });
  requestAnimationFrame(drawBg);
}

initBg();drawBg();

// ─── APP STATE ────────────────────────────────────────────────────────────────
let currentId=null,activeField=null;

function getIconPath(id){
  const p={right_tri:'M2 16 L16 16 L2 2 Z',eq_tri:'M9 2 L16 16 L2 16 Z',scalene:'M3 16 L15 16 L13 2 Z',isos_tri:'M9 2 L15 16 L3 16 Z',square:'M2 2 L16 2 L16 16 L2 16 Z',rect:'M1 5 L17 5 L17 13 L1 13 Z',parallelogram:'M3 16 L14 16 L15 2 L4 2 Z',rhombus:'M9 1 L17 9 L9 17 L1 9 Z',trapezoid:'M2 16 L16 16 L13 4 L5 4 Z',circle:'M9 9 m-7 0 a7 7 0 1 0 14 0 a7 7 0 1 0 -14 0',ellipse:'M9 9 m-7 0 a7 4 0 1 0 14 0 a7 4 0 1 0 -14 0',sphere:'M9 9 m-7 0 a7 7 0 1 0 14 0 a7 7 0 1 0 -14 0 M2 9 Q9 13 16 9',cylinder:'M2 5 L2 13 Q9 17 16 13 L16 5 Q9 9 2 5 M2 5 Q9 1 16 5',cone:'M9 1 L2 16 Q9 13 16 16 Z',ball:'M9 9 m-7 0 a7 7 0 1 0 14 0 a7 7 0 1 0 -14 0'};
  return p[id]||'M2 2 L16 16';
}

function buildSidebar(){
  const sb=document.getElementById('sidebar');
  const groups={};
  SHAPES.forEach(s=>{if(!groups[s.group])groups[s.group]=[];groups[s.group].push(s);});
  Object.entries(groups).forEach(([g,items])=>{
    const lbl=document.createElement('div');lbl.className='grp-label';lbl.textContent=g;sb.appendChild(lbl);
    items.forEach(s=>{
      const btn=document.createElement('button');btn.className='shape-btn';btn.dataset.id=s.id;
      const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
      svg.setAttribute('width','18');svg.setAttribute('height','18');svg.setAttribute('viewBox','0 0 18 18');
      svg.setAttribute('fill','none');svg.setAttribute('stroke','currentColor');svg.setAttribute('stroke-width','1.2');svg.className='ico';
      const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',getIconPath(s.id));svg.appendChild(p);
      const span=document.createElement('span');span.textContent=s.label;
      btn.appendChild(svg);btn.appendChild(span);
      btn.onclick=()=>selectShape(s.id);
      sb.appendChild(btn);
    });
  });
}

function selectShape(id){
  currentId=id;activeField=null;
  document.querySelectorAll('.shape-btn').forEach(b=>b.classList.toggle('active',b.dataset.id===id));
  const def=SHAPES.find(s=>s.id===id);
  document.getElementById('emptyState').style.display='none';
  const fb=document.getElementById('fieldsBody');fb.style.display='flex';
  document.getElementById('pname').textContent=def.label;
  document.getElementById('pformula').textContent=def.formula;
  document.getElementById('hformula').textContent=def.formula;
  document.getElementById('status').textContent='';document.getElementById('status').className='status';
  const fs=document.getElementById('fieldsScroll');
  fs.innerHTML=def.fields.map(f=>`
    <div class="field-row">
      <div class="field-label"><span class="sym">${f.sym}</span><span class="fname">${f.name}</span></div>
      <div class="inp-wrap"><input type="number" step="any" placeholder="—" data-key="${f.k}" id="inp_${f.k}"></div>
    </div>
  `).join('');
  def.fields.forEach(f=>{
    const inp=document.getElementById('inp_'+f.k);
    inp.addEventListener('focus',()=>{activeField=f.k;renderCanvas();});
    inp.addEventListener('blur',()=>{
      activeField=null;
      // при потере фокуса — считаем сразу (число уже полностью введено)
      clearComputed(f.k);
      autoCalculate();
      renderCanvas();
    });
    inp.addEventListener('input',()=>{
      inp.classList.add('user-set');inp.classList.remove('computed');
      clearComputed(f.k);
      scheduleCalc();
    });
  });
  renderCanvas();
}

function getVals(){
  const v={};
  document.querySelectorAll('[data-key]').forEach(inp=>{v[inp.dataset.key]=inp.value&&!isNaN(+inp.value)?+inp.value:null;});
  return v;
}

function getUserKeys(){
  const s=new Set();
  document.querySelectorAll('[data-key]').forEach(inp=>{if(inp.classList.contains('user-set')&&inp.value)s.add(inp.dataset.key);});
  return s;
}

// Сбросить вычисленные поля кроме пользовательского
function clearComputed(exceptKey){
  document.querySelectorAll('[data-key]').forEach(inp=>{
    if(inp.dataset.key!==exceptKey&&inp.classList.contains('computed')){
      inp.value='';inp.classList.remove('computed');
    }
  });
  renderCanvas();
}

// Debounce: вычислять не мгновенно, а через паузу после ввода
let calcTimer=null;
function scheduleCalc(){
  clearTimeout(calcTimer);
  calcTimer=setTimeout(()=>autoCalculate(),700);
}

function autoCalculate(){
  if(!currentId)return;
  const def=SHAPES.find(s=>s.id===currentId);
  const userKeys=getUserKeys();
  // Check if any user input at all
  if(userKeys.size===0){
    // clear all computed
    document.querySelectorAll('[data-key]').forEach(inp=>{if(inp.classList.contains('computed')){inp.value='';inp.classList.remove('computed');}});
    document.getElementById('status').textContent='';
    renderCanvas();return;
  }
  const v=getVals();
  try{
    const res=def.calc(v);
    let computed=0,total=def.fields.length;
    def.fields.forEach(f=>{
      const inp=document.getElementById('inp_'+f.k);if(!inp)return;
      if(userKeys.has(f.k))return; // don't overwrite user input
      const val=res[f.k];
      if(val!=null&&!isNaN(val)&&isFinite(val)&&val>0){
        inp.value=fmt(val);inp.classList.add('computed');inp.classList.remove('user-set');computed++;
      } else {
        // clear stale computed values
        if(inp.classList.contains('computed')){inp.value='';inp.classList.remove('computed');}
      }
    });
    const st=document.getElementById('status');
    if(computed>0){st.textContent='✓ Вычислено автоматически';st.className='status';}
    else{st.textContent='⚠ Недостаточно параметров для вычисления';st.className='status err';}
    renderCanvas();
  }catch(e){
    const st=document.getElementById('status');st.textContent='Ошибка: '+e.message;st.className='status err';
  }
}

function resetAll(){
  document.querySelectorAll('[data-key]').forEach(inp=>{inp.value='';inp.className='';});
  activeField=null;renderCanvas();
  const st=document.getElementById('status');if(st){st.textContent='';st.className='status';}
}

function renderCanvas(){
  const cv=document.getElementById('cv');if(!cv)return;
  const dpr=window.devicePixelRatio||1,W=cv.clientWidth||400,H=cv.clientHeight||260;
  cv.width=W*dpr;cv.height=H*dpr;
  const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
  if(!currentId)return;
  drawGrid(ctx,W,H);
  const def=SHAPES.find(s=>s.id===currentId);
  const vals=getVals();
  try{
    const res=def.calc(vals);
    const merged={};
    Object.keys(res).forEach(k=>{merged[k]=(vals[k]!=null&&vals[k]>0)?vals[k]:(res[k]||0);});
    def.draw(ctx,W,H,merged,activeField);
  }catch(e){def.draw(ctx,W,H,vals,activeField);}
}

function drawGrid(ctx,W,H){
  ctx.save();ctx.strokeStyle='rgba(59,130,246,0.06)';ctx.lineWidth=.5;
  for(let x=0;x<W;x+=30){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=30){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.restore();
}

buildSidebar();
window.addEventListener('resize',()=>{initBg();renderCanvas();});
</script>
